<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>查单系统 V11 - 对话标示优化版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: "Microsoft YaHei", "PingFang SC", sans-serif; background-color: #f0f2f5; height: 100vh; overflow: hidden; }
        .sidebar-left { width: 60px; background-color: #334155; }
        .tab-active { color: #3b82f6; border-bottom: 3px solid #3b82f6; font-weight: bold; }
        
        /* 列表选中态 */
        .order-card { transition: all 0.2s; border-left: 4px solid transparent; background-color: white; border-bottom: 1px solid #f1f5f9; }
        .order-card-active { background-color: #f0f2ff !important; border-left: 4px solid #3f51b5 !important; }
        
        /* 气泡样式优化 */
        .msg-internal { background-color: #fef9c3; border: 1px solid #fef08a; border-radius: 4px; padding: 6px 12px; font-size: 12px; color: #854d0e; }
        .msg-user { background-color: #3b82f6; color: white; border-radius: 4px; padding: 6px 12px; font-size: 12px; box-shadow: 0 2px 4px rgba(59, 130, 246, 0.2); }
        
        /* 标示文字样式 */
        .tag-public { color: #3b82f6; font-weight: bold; margin-left: 4px; }
        
        .mode-user-active { border: 2px solid #3b82f6 !important; background-color: #eff6ff !important; }
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .modal-overlay { background-color: rgba(15, 23, 42, 0.5); backdrop-filter: blur(2px); }
    </style>
</head>
<body class="flex">

    <div class="sidebar-left flex flex-col items-center py-6 space-y-6 shadow-xl z-20">
        <div class="w-9 h-9 bg-indigo-500 rounded-lg flex items-center justify-center text-white font-bold text-sm shadow-lg">K</div>
        <div class="text-white opacity-60 text-[10px] cursor-pointer">📋 派单</div>
    </div>

    <div class="flex-1 flex flex-col h-full bg-white relative">
        <!-- 顶栏 -->
        <div class="h-14 border-b flex items-center px-6 justify-between bg-white z-10 shadow-sm">
            <div class="flex space-x-10 h-full items-center text-sm text-gray-400">
                <button onclick="changeView('processing')" id="tab-processing" class="tab-active h-full px-2">处理中 <span id="count-processing" class="ml-1 bg-blue-500 text-white px-2 rounded-full text-[10px]">0</span></button>
                <button onclick="changeView('tracking')" id="tab-tracking" class="h-full px-2">追踪中 <span id="count-tracking" class="ml-1 bg-gray-200 text-gray-500 px-2 rounded-full text-[10px]">0</span></button>
                <button onclick="changeView('closed')" id="tab-closed" class="h-full px-2">已结案 <span id="count-closed" class="ml-1 bg-gray-200 text-gray-500 px-2 rounded-full text-[10px]">0</span></button>
            </div>
            <button onclick="mockNewOrder()" class="bg-indigo-600 text-white px-5 py-2 rounded-md text-xs font-bold shadow-lg hover:bg-indigo-700 active:scale-95 transition-all">+ 模拟新开单</button>
        </div>

        <div class="flex-1 flex overflow-hidden bg-slate-50">
            <!-- 左侧列表 -->
            <div class="w-[62%] border-r flex flex-col relative overflow-hidden">
                <div class="flex-1 overflow-y-auto custom-scroll p-3 space-y-2" id="order-list"></div>
            </div>

            <!-- 右侧详情 -->
            <div id="detail-panel" class="w-[38%] flex flex-col bg-white">
                <div id="empty-hint" class="flex-1 flex flex-col items-center justify-center p-10 text-center text-slate-400">
                    <span class="text-4xl mb-4 grayscale opacity-50">📁</span>
                    <p class="text-sm font-medium">请选择左侧订单查看详情</p>
                </div>

                <div id="detail-content" class="hidden flex-1 flex flex-col overflow-hidden">
                    <div class="p-4 flex justify-between items-center border-b bg-white">
                        <div class="flex items-center space-x-2">
                            <span class="text-indigo-700 font-bold text-sm">📄 派单资讯</span>
                            <span id="detail-id-tag" class="text-[10px] bg-slate-100 text-slate-500 px-2 py-0.5 rounded"></span>
                        </div>
                        <button onclick="finishOrder()" class="px-4 py-1 bg-indigo-600 text-white text-xs rounded font-bold hover:bg-indigo-700">完成结案</button>
                    </div>
                    
                    <div class="flex-1 overflow-y-auto p-4 custom-scroll bg-[#fcfcfd]" id="chat-scroller">
                        <div id="chat-history" class="space-y-4"></div>
                    </div>

                    <!-- 输入底座 -->
                    <div class="p-4 border-t bg-white">
                        <div class="flex gap-2 mb-3">
                            <button onclick="setReplyMode('need')" class="text-[10px] border border-blue-200 bg-blue-50 text-blue-600 px-3 py-1 rounded-full hover:bg-blue-100">需补资料</button>
                            <button onclick="setReplyMode('close')" class="text-[10px] border border-indigo-200 bg-indigo-50 text-indigo-700 px-3 py-1 rounded-full hover:bg-indigo-100">结果结案</button>
                        </div>
                        <div id="input-box" class="bg-slate-50 border border-slate-200 rounded-lg p-3 transition-all relative">
                            <button id="cancel-btn" onclick="resetMode()" class="hidden absolute -top-2 -right-2 bg-slate-800 text-white w-5 h-5 rounded-full text-[10px] flex items-center justify-center shadow-md">✕</button>
                            <div id="mode-hint" class="hidden text-[10px] font-bold mb-1"></div>
                            <div class="flex items-start">
                                <button onclick="openWiki()" class="mt-1 mr-3 text-slate-400 hover:text-indigo-600 text-lg transition-colors">💬</button>
                                <textarea id="msg-input" class="w-full text-xs outline-none bg-transparent resize-none h-16 leading-relaxed" placeholder="请输入跟进讯息..."></textarea>
                                <button onclick="sendMsg()" class="ml-2 bg-indigo-600 text-white p-2 rounded-lg self-end mb-1 hover:bg-indigo-700 transition-all">➤</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 快速语管理弹窗 -->
    <div id="wiki-modal" class="hidden fixed inset-0 modal-overlay flex items-center justify-center z-50">
        <div class="bg-white rounded-xl shadow-2xl w-[450px] overflow-hidden p-5">
            <div class="font-bold text-gray-800 mb-4 flex justify-between">
                <span>💬 快速语管理</span>
                <button onclick="closeWiki()" class="text-gray-400">✕</button>
            </div>
            <div id="wiki-list" class="space-y-2 mb-4 max-h-56 overflow-y-auto custom-scroll"></div>
            <button onclick="showAddWiki()" class="w-full py-2 border-2 border-dashed border-slate-200 rounded-lg text-slate-400 text-xs hover:border-indigo-300 hover:text-indigo-500">+ 新增快捷短语</button>
            <div id="add-wiki-area" class="hidden mt-4 p-4 bg-slate-50 rounded-lg border">
                <textarea id="new-wiki-text" class="w-full border p-2 text-xs rounded outline-none" rows="2"></textarea>
                <div class="flex justify-end mt-2 gap-2">
                    <button onclick="hideAddWiki()" class="text-xs text-slate-500">取消</button>
                    <button onclick="saveWiki()" class="px-4 py-1 bg-indigo-600 text-white text-xs rounded shadow-md">保存</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let orders = [];
        let wikiPhrases = ["请提供充值截图，谢谢。", "处理完毕，请核对。"];
        let currentView = 'processing';
        let selectedOrderId = null;
        let replyMode = 'internal';

        function mockNewOrder() {
            const id = 'KRF-' + Math.floor(Math.random() * 900000 + 100000);
            orders.unshift({ id, status: 'processing', time: new Date().toLocaleString(), logs: [{ sender: 'kk-yo', time: new Date().toLocaleTimeString(), text: '已承接工单', isUser: false }] });
            renderList();
            selectOrder(id);
        }

        function renderList() {
            const list = document.getElementById('order-list');
            list.innerHTML = '';
            orders.filter(o => o.status === currentView).forEach(o => {
                const isActive = selectedOrderId === o.id;
                const div = document.createElement('div');
                div.className = `order-card p-4 cursor-pointer ${isActive ? 'order-card-active' : ''}`;
                div.onclick = () => selectOrder(o.id);
                div.innerHTML = `<div class="flex justify-between items-start mb-2"><div class="flex items-center space-x-2"><span class="bg-indigo-100 text-indigo-600 text-[10px] font-bold px-2 py-0.5 rounded">四方进货</span><span class="font-bold text-slate-700 text-xs">${o.id}</span></div><span class="text-[10px] text-slate-400">${o.time.split(' ')[1]}</span></div><div class="text-[11px] text-slate-500">D早-杜拜-奶茶</div>`;
                list.appendChild(div);
            });
            document.getElementById('count-processing').innerText = orders.filter(o => o.status === 'processing').length;
            document.getElementById('count-tracking').innerText = orders.filter(o => o.status === 'tracking').length;
            document.getElementById('count-closed').innerText = orders.filter(o => o.status === 'closed').length;
        }

        function selectOrder(id) {
            selectedOrderId = id;
            const order = orders.find(o => o.id === id);
            document.getElementById('empty-hint').classList.add('hidden');
            document.getElementById('detail-content').classList.remove('hidden');
            document.getElementById('detail-id-tag').innerText = id;
            renderLogs(order.logs);
            renderList();
            resetMode();
        }

        function renderLogs(logs) {
            const history = document.getElementById('chat-history');
            history.innerHTML = '';
            logs.forEach(l => {
                const div = document.createElement('div');
                div.className = "flex flex-col items-end";
                // 还原图片中的样式：时间 + 姓名 + [发给用户] 标示
                div.innerHTML = `
                    <div class="flex items-center mb-1 text-[11px] text-gray-500">
                        <span>${l.time}</span>
                        <span class="ml-1">${l.sender}</span>
                        ${l.isUser ? '<span class="tag-public">[发给用户]</span>' : ''}
                    </div>
                    <div class="${l.isUser ? 'msg-user' : 'msg-internal'}">${l.text}</div>
                `;
                history.appendChild(div);
            });
            const scroller = document.getElementById('chat-scroller');
            scroller.scrollTop = scroller.scrollHeight;
        }

        document.getElementById('msg-input').addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMsg(); }
        });

        function sendMsg() {
            const input = document.getElementById('msg-input');
            if(!input.value.trim() || !selectedOrderId) return;
            const order = orders.find(o => o.id === selectedOrderId);
            order.logs.push({ sender: 'kk-yo', time: new Date().toLocaleTimeString(), text: input.value.trim(), isUser: replyMode !== 'internal' });
            renderLogs(order.logs);
            if(replyMode === 'close') finishOrder(); else resetMode();
        }

        function setReplyMode(mode) {
            replyMode = mode;
            document.getElementById('input-box').classList.add('mode-user-active');
            document.getElementById('cancel-btn').classList.remove('hidden');
            const hint = document.getElementById('mode-hint');
            hint.classList.remove('hidden');
            hint.innerText = mode === 'need' ? "📢 当前模式：发送给用户 (保持工单)" : "📢 当前模式：发送给用户 (自动结案)";
            hint.className = `text-[10px] font-bold mb-1 ${mode === 'need' ? 'text-blue-600' : 'text-indigo-700'}`;
        }

        function resetMode() {
            replyMode = 'internal';
            document.getElementById('input-box').classList.remove('mode-user-active');
            document.getElementById('mode-hint').classList.add('hidden');
            document.getElementById('cancel-btn').classList.add('hidden');
            document.getElementById('msg-input').value = '';
        }

        function finishOrder() {
            const order = orders.find(o => o.id === selectedOrderId);
            if(order) order.status = 'closed';
            selectedOrderId = null;
            document.getElementById('detail-content').classList.add('hidden');
            document.getElementById('empty-hint').classList.remove('hidden');
            renderList();
        }

        function changeView(v) {
            currentView = v;
            selectedOrderId = null;
            document.getElementById('detail-content').classList.add('hidden');
            document.getElementById('empty-hint').classList.remove('hidden');
            renderList();
            ['processing','tracking','closed'].forEach(x => document.getElementById('tab-'+x).className = (x===v)?'tab-active h-full px-2':'h-full px-2');
        }

        function openWiki() { document.getElementById('wiki-modal').classList.remove('hidden'); renderWikiList(); }
        function closeWiki() { document.getElementById('wiki-modal').classList.add('hidden'); }
        function renderWikiList() {
            const list = document.getElementById('wiki-list');
            list.innerHTML = '';
            wikiPhrases.forEach((p, i) => {
                const d = document.createElement('div');
                d.className = "text-xs p-3 hover:bg-indigo-50 border rounded-lg cursor-pointer transition-colors";
                d.onclick = () => { document.getElementById('msg-input').value = p; closeWiki(); };
                d.innerText = p;
                list.appendChild(d);
            });
        }
        function showAddWiki() { document.getElementById('add-wiki-area').classList.remove('hidden'); }
        function hideAddWiki() { document.getElementById('add-wiki-area').classList.add('hidden'); }
        function saveWiki() { const v = document.getElementById('new-wiki-text').value.trim(); if(v) { wikiPhrases.push(v); renderWikiList(); hideAddWiki(); } }
    </script>
</body>
</html>
